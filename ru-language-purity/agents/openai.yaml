display_name: RU/EN Language Purity
short_description: Естественный русский научный текст без калек и суржика; зеркальная проверка английской версии. Общий источник де-кальке для навыков статей и НТО.
default_prompt: |
  Проверь текст по навыку ru-language-purity: для русской прозы примени
  references/decalque-ru-en.md (стратегические правила, таблицы по классам
  дефектов, тест существования для придуманных слов, deliberate keeps,
  grep-рецепт), убери кальки, ложных друзей и суржик; для английской версии,
  написанной с русского черновика, поймай инсайдерские кальки и рабочий
  жаргон. Перечисли все правки и оставшиеся сомнительные места.
