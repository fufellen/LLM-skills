display_name: Scientific Article Writing
short_description: Универсальная дисциплина подготовки и QA научных статей (любой журнал/конференция); venue-навыки поверх нее.
default_prompt: |
  Проведи подготовку/проверку рукописи по навыку scientific-article-writing:
  определи source-of-truth черновик, проверь числа против данных, порядок
  цитирования, аббревиатуры, типографику, плейсхолдеры и артефакт DOCX;
  примени правила целевого venue-навыка (APEDE/ОиС), синхронизируй
  двуязычные версии и перечисли все оставшиеся нарушения и плейсхолдеры.
